<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign in — RAGtime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    form { background: #1e293b; padding: 2rem 2.5rem; border-radius: 0.75rem; width: min(24rem, 90vw); box-shadow: 0 8px 24px rgba(0,0,0,.35); }
    h1 { margin: 0 0 1.25rem; font-size: 1.25rem; }
    label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; color: #94a3b8; }
    input[type=text], input[type=password] { width: 100%; padding: 0.5rem 0.625rem; margin-bottom: 1rem; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 0.375rem; }
    button { width: 100%; padding: 0.625rem; background: #6366f1; color: white; border: 0; border-radius: 0.375rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #4f46e5; }
    .errors { background: #7f1d1d; color: #fecaca; padding: 0.5rem 0.75rem; border-radius: 0.375rem; margin-bottom: 1rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <h1>Sign in to RAGtime</h1>
    {% if form.non_field_errors %}
      <div class="errors">{{ form.non_field_errors }}</div>
    {% endif %}
    <label for="id_username">Username</label>
    <input type="text" name="username" id="id_username" autocomplete="username" required autofocus>
    <label for="id_password">Password</label>
    <input type="password" name="password" id="id_password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    <input type="hidden" name="next" value="{{ next|default:'/chat/' }}">
  </form>
</body>
</html>
