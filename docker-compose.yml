services:
  db:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ragtime
      POSTGRES_USER: ragtime
      POSTGRES_PASSWORD: ragtime
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ragtime"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
