services:
  db:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:${RAGTIME_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${RAGTIME_DB_NAME:-ragtime}
      POSTGRES_USER: ${RAGTIME_DB_USER:-ragtime}
      POSTGRES_PASSWORD: ${RAGTIME_DB_PASSWORD:-ragtime}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${RAGTIME_DB_USER:-ragtime}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && printf \"GET /readyz HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q \"all shards are ready\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_data:
