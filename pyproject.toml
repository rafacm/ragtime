[project]
name = "ragtime"
version = "0.1.0"
description = "Retrieval Augmented Generation (RAG) in the Key of Jazz"
requires-python = ">=3.13,<3.14"
dependencies = [
    "django>=5.2,<5.3",
    "django-q2>=1.7,<2",
    "openai>=1.0,<2",
    "httpx>=0.27,<1",
    "beautifulsoup4>=4.12,<5",
    "python-dotenv>=1.0,<2",
    "pyyaml>=6.0.3",
    "mutagen>=1.47,<2",
]

[project.optional-dependencies]
observability = ["langfuse>=4,<5"]
